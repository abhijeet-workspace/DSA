name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile
        run: bash test/compile_all.sh